name: Draft Release

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'draft = Windows-only fast iteration; ga = full Windows + macOS + Linux matrix'
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - ga

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.release_mode == 'ga' && '[{"platform":"windows-latest","args":""},{"platform":"macos-latest","args":"--target universal-apple-darwin"},{"platform":"ubuntu-22.04","args":""}]' || '[{"platform":"windows-latest","args":""}]') }}

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__-11
          releaseName: "CairnCC v__VERSION__-11"
          releaseBody: |
            ## v0.1.72-11 — Out-of-order assistant bubble fix (multi-bubble turns + thinking/tool windows)

            - **Assistant bubbles no longer land BELOW a user message typed mid-turn.** Reported: a response bubble keeps showing up out of order. Root cause: the "preceding stream pending" guard on the optimistic user entry was only set when `streamingText` was non-empty — it missed the **thinking phase**, the **tool-use phase**, and the **gap between bubbles in a multi-bubble turn**. In those windows the user message landed without the flag, and the next `message_complete` appended at the end instead of splicing in front. A secondary bug: even when the flag was set, the splice cleared it after the first bubble, so multi-bubble turns silently mis-ordered every bubble after the first.

              Fix in `session-store.svelte.ts`:
              1. Flag the optimistic user whenever `streamingText` OR `thinkingText` is non-empty OR `phase ∈ ACTIVE_PHASES` (`spawning`/`running`) — catches all in-progress assistant turn windows.
              2. Stop deleting the flag on splice. All `message_completes` during the turn now splice before the user.
              3. New `_clearPrecedingStreamPending(ctx)` helper called from the `run_state` reducer on idle/terminal transitions — flag clears once the turn ends, so the next turn's bubbles append normally.

              Regression tests: multi-bubble turn keeps user pinned at end of all assistant bubbles; idle transition clears the flag and the next turn appends normally.

            Carries -10 (gentler still-working notice + 120s timeout), -9 (list_runs no longer hides empty stopped sessions), -8 (turn-bounded tail-load), -7 (continuation-stream wrong-bubble fix), -6 (await tick before scrollHeight pin), -5 (drift re-pin + dup-user-bubble idempotency), -4 (scroll-animation suppression), -3 (session-switch race), and v0.1.72 session-log repair unchanged.
          releaseDraft: true
          prerelease: true
          includeUpdaterJson: true
          args: ${{ matrix.args }}
