name: Draft Release

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'draft = Windows-only fast iteration; ga = full Windows + macOS + Linux matrix'
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - ga

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.release_mode == 'ga' && '[{"platform":"windows-latest","args":""},{"platform":"macos-latest","args":"--target universal-apple-darwin"},{"platform":"ubuntu-22.04","args":""}]' || '[{"platform":"windows-latest","args":""}]') }}

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__-6
          releaseName: "CairnCC v__VERSION__-6"
          releaseBody: |
            ## v0.1.72-6 — Bulk-load scroll drift (intermittent)

            - **Intermittent scroll drift on bulk history load.** -5 added a per-chunk `scrollTop = scrollHeight` re-pin, but pinned from inside a `requestAnimationFrame` callback. Svelte 5 doesn't guarantee the `$state` flush has run by then, so on some loads we read the pre-grow `scrollHeight` and pinned to the OLD bottom — then the new entries painted and the viewport ended up mid-history. `growRenderLimitChunked` now `await tick()`s before reading `scrollHeight`, so the flush is guaranteed before the pin.

            Carries -5 (drift re-pin + dup-user-bubble idempotency), -4 (scroll-animation suppression), -3 (session-switch race), and v0.1.72 session-log repair unchanged.
          releaseDraft: true
          prerelease: true
          includeUpdaterJson: true
          args: ${{ matrix.args }}
