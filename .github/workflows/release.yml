name: Draft Release

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'draft = Windows-only fast iteration; ga = full Windows + macOS + Linux matrix'
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - ga

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.release_mode == 'ga' && '[{"platform":"windows-latest","args":""},{"platform":"macos-latest","args":"--target universal-apple-darwin"},{"platform":"ubuntu-22.04","args":""}]' || '[{"platform":"windows-latest","args":""}]') }}

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__-4
          releaseName: "CairnCC v__VERSION__-4"
          releaseBody: |
            ## v0.1.72-4 — Scroll behavior fixes

            Two related scroll bugs on existing chats with long history:

            - **Auto-resume visibly scrolled through hours of chat history on load.** `historyLoaded` was flipped to `true` before `growRenderLimitChunked` finished prepending older entries, so each chunk of 200 bulk-mounted older messages played the `in:fly` (y:10, 600ms) entry animation as it appeared. Now `historyLoaded` stays `false` for the entire progressive growth window — older entries get `duration:0` mount instead — and flips to `true` only after `renderLimit` reaches Infinity, with a final `scrollTop=scrollHeight` so we land pinned at the bottom rather than mid-history.
            - **Drip animation force-scrolled to bottom when the user had scrolled up to read above.** `handleChatScroll` recomputed `isChatAutoScroll` from raw position on every `onscroll` event — including programmatic scrolls fired by the drip/auto-scroll rAFs themselves — clobbering the user's "I'm reading above" intent back to `true` on each programmatic snap. Now position-based updates only apply when a `wheel` / `touchmove` / `keydown` happened within the last 200ms. Programmatic scroll events still fire onscroll but no longer override user intent.

            Carries v0.1.72-3 session-switch race fixes and v0.1.72 session-log repair feature unchanged.
          releaseDraft: true
          prerelease: true
          includeUpdaterJson: true
          args: ${{ matrix.args }}
