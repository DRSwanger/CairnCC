name: Draft Release

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'draft = Windows-only fast iteration; ga = full Windows + macOS + Linux matrix'
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - ga

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.release_mode == 'ga' && '[{"platform":"windows-latest","args":""},{"platform":"macos-latest","args":"--target universal-apple-darwin"},{"platform":"ubuntu-22.04","args":""}]' || '[{"platform":"windows-latest","args":""}]') }}

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__-1
          releaseName: "CairnCC v__VERSION__-1"
          releaseBody: |
            ## Draft v0.1.69-1

            First full-matrix build (Windows + macOS universal + Linux x64). Carries all v0.1.68 fixes.

            Cross-session correctness:

            - Streaming locals (`runHasStreamed`, `streamingDraining`, `lastStreamingText`) now scoped to `store.run?.id` — no more ghost replies in the destination chat after switching mid-stream.
            - Thinking-panel state resets on session change instead of latching.
            - `applyEventBatch` skips already-processed `_seq` — no duplicate user bubbles when switching into a session whose events were still replaying.

            Chat UI:

            - Fallback streaming container renders as a real chat bubble (gradient, glow, tail); bubble styles promoted to `:global(...)`.
            - Modern 3D chat bubbles with rounded tails, layered shadows, dark-mode glow.
            - Status bar slimmed to a single 36px row.
            - Bubble palette picker (10 presets) + reverse-colors toggle. Persisted to `localStorage`.
            - Bubble fill follows the palette, not just the glow.
            - Assistant bubbles get a colored glow mirroring the user bubble's.

            Ordering & drafts:

            - Optimistic user tagged `precedingStreamPending`; trailing `message_complete` splices in before it — no more new-user-above-still-finishing-response inversion.
            - Drafts survive session switches via reactive `$effect` once `PromptInput` actually mounts.
            - Sent text doesn't rehydrate on switch-back — draft dropped on send.
            - Drafts survive reload / app restart via `localStorage` (`cairncc:drafts:v1`).

            Performance & memory:

            - Drip rAF loops self-cancel when caught up.
            - Decode tail mutates a sibling span via `textContent` — markdown pipeline no longer re-runs every frame.
            - Enrichment effects (copy buttons, image lightbox, basePath resolve) gated on `!streaming`.
            - Decode glyph buffer pre-allocated.
            - Tool output truncated in timeline + snapshot (32 KB cap, 16K head + 8K tail). Full output stays in `events.jsonl`.
            - Snapshot restore truncates too, not just live ingest.
            - Running sessions snapshot to IDB (throttled per 200 events).

            Other:

            - Session-wide rename for `s:`-grouped sessions.
            - Mobile sidebar auto-closes on ≤767px viewports.
            - Effort persisted per-run.
            - Model selector falls back to CLI's current model when run has no pinned model.
            - Opus label reads "Opus 4.7" consistently.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
