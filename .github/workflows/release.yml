name: Draft Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__-7
          releaseName: "CairnCC v__VERSION__-7"
          releaseBody: |
            ## Draft v0.1.68-7

            Follow-up to v0.1.68-6 — fixes duplicate-user-bubble bug reported during thinking.

            - **Fixes duplicate user message on switch-into-thinking-session.** When you click into a chat that's actively generating, the middleware buffers bus events while `loadRun`'s catchup runs; both paths were processing the same `user_message` event, and content-dedup only fires on entries without a CLI UUID — so the second application stamped an identical bubble below the response. `applyEventBatch` now skips events whose `_seq` is already processed (same gate `applyEvent` uses). Regression test added.

            Carries v0.1.68-6:
            - Tiered render on chat switch (60 entries first, full history after paint).
            - New-chat draft preserved across session clicks via sentinel key.

            Carries v0.1.68-5:
            - Effort persisted per-run (restored on switch, seeded on new runs).
            - Model selector falls back to CLI's current model when run has no pinned model.
            - Switch+submit ordering race fixed — new turns always land below the prior response.
            - Chunked event replay with event-loop yields during initial load.
            - Opus label reads "Opus 4.7" consistently.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
