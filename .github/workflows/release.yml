name: Draft Release

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'draft = Windows-only fast iteration; ga = full Windows + macOS + Linux matrix'
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - ga

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.release_mode == 'ga' && '[{"platform":"windows-latest","args":""},{"platform":"macos-latest","args":"--target universal-apple-darwin"},{"platform":"ubuntu-22.04","args":""}]' || '[{"platform":"windows-latest","args":""}]') }}

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__-5
          releaseName: "CairnCC v__VERSION__-5"
          releaseBody: |
            ## v0.1.72-5 — Scroll drift + duplicate user bubble

            - **Bulk history load no longer drifts the viewport upward through history.** Even with the entry animation suppressed in -4, each progressive growth chunk prepended ~200 older entries above the viewport while `scrollTop` stayed constant, so the visible window drifted up as `scrollHeight` grew (Dallas: "text flying by"). Now `growRenderLimitChunked` re-pins `scrollTop = scrollHeight` on every chunk's paint when `isChatAutoScroll` is true, not just at the final step.
            - **Duplicate user bubble after switch-during-thinking.** Desktop Tauri's `bus-event` emit doesn't include `_seq` (only WS broadcasts do — see `broadcaster.rs::persist_and_emit`), so live events never advance `_lastProcessedSeq`. When the user switched away from an actively-thinking session and came back, the memCache snapshot retained a stale seq and catchup re-fetched the same `user_message` that was already merged into the optimistic entry. Content-dedup missed it (existing entry now had `cliUuid`) and appended a second bubble. Added uuid-based idempotency: skip the reducer entirely when `ev.uuid` already exists as `cliUuid` on the timeline.

            Carries -4 scroll-animation fix, -3 session-switch race fixes, and v0.1.72 session-log repair unchanged.
          releaseDraft: true
          prerelease: true
          includeUpdaterJson: true
          args: ${{ matrix.args }}
