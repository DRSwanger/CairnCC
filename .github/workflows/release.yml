name: Draft Release

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'draft = Windows-only fast iteration; ga = full Windows + macOS + Linux matrix'
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - ga

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.release_mode == 'ga' && '[{"platform":"windows-latest","args":""},{"platform":"macos-latest","args":"--target universal-apple-darwin"},{"platform":"ubuntu-22.04","args":""}]' || '[{"platform":"windows-latest","args":""}]') }}

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: "CairnCC v__VERSION__"
          releaseBody: |
            ## v0.1.70

            - **Stale "Process exited with code …" red banner on long-idle remote sessions.** When a remote (SSH) session sat idle and the SSH client died from a Windows session event (logoff, sleep, fast user switch — exit code `DBG_TERMINATE_PROCESS` / `0x40010004`), CairnCC's EOF handler synthesized a `failed` run_state with an obnoxious error banner. Fix: `session_actor::handle_eof` now treats EOF arriving while `self.state == "idle"` as a graceful `stopped` rather than a `failed`. The session ended cleanly — losing the transport later isn't a failure. Meta gets `RunStatus::Stopped`; no red banner on revisit.

            Carries all v0.1.69 fixes:

            - **Out-of-order replay on session switch** — switching into a chat while another session was thinking caused the destination's recent messages to render out of order with holes. `applyEvent` now buffers into `_replayBuffer` while loadRun/resumeSession is in flight; `_settleLoad` drains it after the historical batch.
            - **Memory boot-prompt switched to lazy-load.** Read MEMORY.md only and pull linked files on-demand instead of eager-reading every memory file. One-time migration in `storage::settings::load()` rewrites old settings.

            And the v0.1.68 fixes through -19: cross-session streaming bleed scoped to `run.id`, thinking-panel reset on session change, fallback streaming container as a real chat bubble, 3D bubble palette + reverse toggle, optimistic-user ordering via `precedingStreamPending`, draft persistence across switches + reloads (`cairncc:drafts:v1`), drip rAF self-cancellation, decode-tail textContent mutation, 32 KB tool-output truncation in timeline + snapshot, session-wide rename for `s:`-grouped sessions, mobile sidebar auto-close, per-run effort persistence, model selector CLI fallback, "Opus 4.7" label.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
