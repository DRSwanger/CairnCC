name: Draft Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__-10
          releaseName: "CairnCC v__VERSION__-10"
          releaseBody: |
            ## Draft v0.1.68-10

            Draft persistence â€” actually fixed this time:

            - **Drafts now survive session switches.** Root cause: `PromptInput` is conditionally rendered (`{#if sessionAlive || phase === ready || ...}`), so during the switch window when `phase === "loading"` the component unmounts. The rAF-scheduled `promptRef?.restoreSnapshot(incomingDraft)` fired while `promptRef` was `undefined` and silently no-op'd â€” the draft stayed in `draftsByRunId` + `localStorage` but never made it back into the UI. Replaced the rAF-based apply with a reactive `$effect` that watches `promptRef` and `store.run?.id` and re-applies the pending draft the moment the composer remounts.
            - **Sent text no longer rehydrates on switch-back.** `sendMessage` now eagerly deletes the draft entry for the current run (+ persists), so typing â†’ send â†’ switch-away â†’ switch-back cannot restore the just-sent message into the composer.

            Carries v0.1.68-9:

            - Draft persistence across reload / app restart via `localStorage` (`cairncc:drafts:v1`), attachments stripped for quota.
            - Race closed on New Chat click (`saveDraftFor` before `loadRun("")`).
            - Blank during session switch â€” `isLoadingReplay` getter.
            - Welcome flash on startup auto-resume â€” `autoResumeResolving`.

            Carries v0.1.68-8:
            - Duplicate user bubble on switch-into-thinking-session â€” `applyEventBatch` now skips already-processed `_seq`.
            - "Envisioningâ€¦" thinking bubble showing another session's text â€” `_tryApplySnapshot` treats `thinkingText`/`streamingText` as non-persistent.

            Carries v0.1.68-6:
            - Tiered render on chat switch (60 entries first, full history after paint).
            - New-chat draft preserved across session clicks via sentinel key.

            Carries v0.1.68-5:
            - Effort persisted per-run (restored on switch, seeded on new runs).
            - Model selector falls back to CLI's current model when run has no pinned model.
            - Switch+submit ordering race fixed â€” new turns always land below the prior response.
            - Chunked event replay with event-loop yields during initial load.
            - Opus label reads "Opus 4.7" consistently.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
