name: Draft Release

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'draft = Windows-only fast iteration; ga = full Windows + macOS + Linux matrix'
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - ga

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.release_mode == 'ga' && '[{"platform":"windows-latest","args":""},{"platform":"macos-latest","args":"--target universal-apple-darwin"},{"platform":"ubuntu-22.04","args":""}]' || '[{"platform":"windows-latest","args":""}]') }}

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__-2
          releaseName: "CairnCC v__VERSION__-2"
          releaseBody: |
            ## v0.1.71-2 — CSP fix

            DevTools (F12) from v0.1.71-1 surfaced the actual cause of the black-window bug: CSP misconfiguration.

            - **Inline styles blocked.** Tauri auto-injects a `nonce` into `style-src`, which (per spec) overrides `'unsafe-inline'` — so every dynamic Svelte style was rejected, leaving the Rift CNC page unstyled and visually black. Fixed via `dangerousDisableAssetCspModification: ["style-src"]` so the nonce is no longer injected.
            - **IPC blocked.** `connect-src` was missing `ipc:` / `http://ipc.localhost` (Windows fetch-IPC scheme). Tauri was silently falling back to the slower `postMessage` path, which is likely why the `[ocv:store] response timeout: no content after 60s` warnings appeared. Now allow-listed.
            - **Fonts.** Google Fonts allow-listed in `style-src` / `font-src` (cosmetic).

            Still a diagnostic draft — `devtools` feature is still compiled in. If the Rift CNC session opens cleanly and responses don't time out, we'll cut a clean v0.1.72 GA without devtools.
          releaseDraft: true
          prerelease: true
          includeUpdaterJson: true
          args: ${{ matrix.args }}
