name: Draft Release

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'draft = Windows-only fast iteration; ga = full Windows + macOS + Linux matrix'
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - ga

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.release_mode == 'ga' && '[{"platform":"windows-latest","args":""},{"platform":"macos-latest","args":"--target universal-apple-darwin"},{"platform":"ubuntu-22.04","args":""}]' || '[{"platform":"windows-latest","args":""}]') }}

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__-8
          releaseName: "CairnCC v__VERSION__-8"
          releaseBody: |
            ## v0.1.72-8 — Tail-load: long sessions open in O(last 15 turns)

            - **Cold-open of long sessions is now turn-bounded.** Previously, opening a stopped chat with thousands of events did a full disk-replay: backend deserialized every line, IPC shipped the whole array, and the frontend reducer chewed through it before the UI could paint. For sessions like the Rift CNC dialog or the CairnCC dev chat itself, that was multi-second latency every time the IDB snapshot wasn't already warm.

              New backend command `get_bus_events_tail(turns=15)` walks back from EOF to the 15th-most-recent `user_message` and ships only that slice, plus a must-keep prefix (`session_init` for store metadata, last pre-window `usage_update` for cumulative totals). Slicing on user-message boundaries means tool_start/tool_end pairs are never split, so the reducer's tool index stays intact. The store tracks `hasOlder` / `oldestLoadedSeq` watermarks so a future "load older" affordance (Phase 2) can fetch back a range on scroll-up.

              Partial loads do NOT write IDB snapshots — caching a truncated state would mask the missing older events on the next cold load. Short sessions (≤15 turns) still take the full-replay + snapshot-write path and behave identically to before. Snapshot-hit, in-memory cache, and live catchup paths are all unchanged.

            Carries -7 (continuation-stream wrong-bubble fix), -6 (await tick before scrollHeight pin), -5 (drift re-pin + dup-user-bubble idempotency), -4 (scroll-animation suppression), -3 (session-switch race), and v0.1.72 session-log repair unchanged.
          releaseDraft: true
          prerelease: true
          includeUpdaterJson: true
          args: ${{ matrix.args }}
