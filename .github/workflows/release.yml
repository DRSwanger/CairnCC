name: Draft Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__-5
          releaseName: "CairnCC v__VERSION__-5"
          releaseBody: |
            ## Draft v0.1.68-5

            Bundled fixes for the four issues surfaced while testing v0.1.68-4:

            - **Effort is now per-chat.** Changing effort in one chat no longer leaks into others. The selected level is persisted to that run's meta and restored on chat switch. New chats are seeded with the current effort at creation time.
            - **Model selector no longer shows "Default" when you're actually on Opus.** On load, if a chat has no pinned model, the selector falls back to whatever the CLI is actually using (`~/.claude/settings.json`).
            - **Switching chats while typing no longer flips the order** of your new message vs. the prior response. `sendMessage` now waits for the replay gate to settle before pushing the optimistic user bubble, so the new turn always lands at the bottom.
            - **Large chats (e.g. Rift CNC) no longer freeze the UI on load.** Initial replay is chunked and yields to the event loop between chunks — you can click away to a different chat mid-load and it aborts cleanly.
            - Patched stale "Opus 4.6" label in the CLI control response so Opus now displays as "Opus 4.7" consistently.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
