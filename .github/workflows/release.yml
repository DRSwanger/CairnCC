name: Draft Release

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'draft = Windows-only fast iteration; ga = full Windows + macOS + Linux matrix'
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - ga

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.release_mode == 'ga' && '[{"platform":"windows-latest","args":""},{"platform":"macos-latest","args":"--target universal-apple-darwin"},{"platform":"ubuntu-22.04","args":""}]' || '[{"platform":"windows-latest","args":""}]') }}

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__-3
          releaseName: "CairnCC v__VERSION__-3"
          releaseBody: |
            ## v0.1.72-3 — Session-switch race fix

            Three related bugs in the session-switch flow that caused freezes, duplicated prompts, and missing assistant responses when clicking between chats while one was mid-stream:

            - **Live events dropped during the loadRun await window.** `applyEvent`'s run_id guard ran before the `_replayBuffer` push, so incoming events for the run being switched into were dropped (instead of buffered) until `this.run` flipped to the new id. Reordered so the buffer wins.
            - **Batched live events bypassed the buffer entirely.** `applyEventBatch` had no buffer check; a microbatch flushed during the await reduced incoming events into the outgoing run's live ctx and was visible as flicker / out-of-order entries before the snapshot apply overwrote them. New `applyLiveEvents` entry point routes both single and batched events through the buffer.
            - **Catchup duplicated user prompts on terminal-on-return.** `loadRun` passes `replayOnly: isTerminal` to its catchup batch; `user_message` content-dedup was gated on `!replayOnly`, so the backend's confirmed message appended a NEW bubble instead of merging into the optimistic entry preserved in the memcache snapshot. Dedup now always runs — the `!cliUuid` filter already makes it safe under full replay.

            Three regression tests in `session-store.test.ts` cover each path. Bundles all carry the v0.1.72 session-log repair feature from -1/-2 unchanged.
          releaseDraft: true
          prerelease: true
          includeUpdaterJson: true
          args: ${{ matrix.args }}
