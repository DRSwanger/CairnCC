name: Draft Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__-9
          releaseName: "CairnCC v__VERSION__-9"
          releaseBody: |
            ## Draft v0.1.68-9

            Composer draft persistence:

            - **Draft survives reload / app restart.** `draftsByRunId` was an in-memory Map — closing CairnCC or hitting reload wiped every unsent composer. Now persisted to `localStorage` (`cairncc:drafts:v1`) with the existing LRU cap. Attachments are stripped before write (base64 payloads exceed the ~5MB quota); text, pasted blocks, and path refs round-trip.
            - **Race closed on New Chat click.** `onNewChat` now calls `saveDraftFor(store.run?.id)` synchronously before `loadRun("")` nulls `store.run`, so the runId `$effect` can't race in with `outgoingId=undefined` and skip the save.

            Blank / spinner flash fixes:

            - **No more blank during session switch.** `loadRun` set phase to `running`/`ready` from `run.status` *before* `getBusEvents()`/IDB snapshot resolved, so the spinner guard (`phase === "loading"`) failed and the `{:else}` branch rendered an empty timeline. New `store.isLoadingReplay` getter keeps the spinner visible through the replay gap.
            - **No more welcome flash on startup auto-resume.** `autoResumeResolving` now covers the window between `api.listRuns()` kicking off and `goto(/chat?run=...)` landing, suppressing the hero page and showing the spinner instead.

            Carries v0.1.68-8:
            - Duplicate user bubble on switch-into-thinking-session — `applyEventBatch` now skips already-processed `_seq`.
            - "Envisioning…" thinking bubble showing another session's text — `_tryApplySnapshot` treats `thinkingText`/`streamingText` as non-persistent.

            Carries v0.1.68-6:
            - Tiered render on chat switch (60 entries first, full history after paint).
            - New-chat draft preserved across session clicks via sentinel key.

            Carries v0.1.68-5:
            - Effort persisted per-run (restored on switch, seeded on new runs).
            - Model selector falls back to CLI's current model when run has no pinned model.
            - Switch+submit ordering race fixed — new turns always land below the prior response.
            - Chunked event replay with event-loop yields during initial load.
            - Opus label reads "Opus 4.7" consistently.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
