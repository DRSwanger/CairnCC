name: Draft Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__-14
          releaseName: "CairnCC v__VERSION__-14"
          releaseBody: |
            ## Draft v0.1.68-14

            Snapshot-restore freeze fix (Rift CNC switch-in):

            - **Snapshots now truncate on restore, not just on live ingest.** -13's 32 KB cap was applied in the reducer, but `_tryApplySnapshot` assigned `timeline`/`tools`/`hookEvents` straight from the IDB snapshot — so any session whose snapshot was written *before* -13 still rehydrated the full uncapped tool outputs (e.g. ~11 MB on the Rift CNC chat). Switching into one of those sessions blasted the whole blob into reactive state + DOM and pinned the main thread (scroll still worked since it's GPU-driven, but input and session switches were frozen). Restore path now walks `timeline` (incl. `subTimeline`), `tools[]`, and `hookEvents[]` and applies the same head/tail cap.

            Carries v0.1.68-13:

            - **Tool output truncation in the timeline.** Long `Read`/`Bash`/`Grep` results were pinning the entire tool output (top entries 280–335 KB each) in the reactive timeline, the IDB snapshot, and the WebView DOM. In the Rift CNC chat that's 160 tool_end events / ~11 MB of result text held live, which was pushing the WebView toward OOM as the session grew. The reducer now caps each string field inside `tool_end.output` / `tool_end.tool_use_result` at 32 KB (16 KB head + 8 KB tail with a `[... N bytes truncated ...]` marker). Canonical full output is still on disk in `events.jsonl` — only the in-memory/UI copy is bounded.

            Carries v0.1.68-12:

            Four small quality-of-life fixes:

            - **Session-wide rename.** Renaming a conversation that lives across multiple runs (a `s:`-grouped session) now renames every run sharing that `session_id` in one shot, and any new run that later attaches to the session inherits the name automatically (`inherit_session_name_on_attach`). Old per-run rename still applies for ungrouped runs.
            - **Mobile sidebar auto-close.** On viewports `≤767px`, picking a conversation or resume action closes the sidebar so the chat actually has room to breathe. Initial load on a narrow viewport starts collapsed.
            - **Debug-only dev token override.** Setting `CAIRNCC_DEV_TOKEN` in a debug build now seeds the live web-server token and writes it to `~/.cairncc/dev_token` for curl/Playwright smoke tests. Release builds keep the random 32-char token — no behavior change for users.
            - **Thinking-panel cross-session bleed fixed.** `displayThinkingText` and `thinkingExpanded` were latched (only cleared when a *new user message* landed on the active session), so switching into a Haiku session — or any session whose own thinking hadn't yet started — would re-display the previous Opus/Sonnet session's thinking trace under the spinner. Now both reset whenever `store.run?.id` changes.

            Carries v0.1.68-11:

            Running-session snapshot cache — cold-start load for big live chats (e.g. Rift CNC):

            - **Previously:** only terminal + idle sessions wrote IDB snapshots. A session in `running` status always re-read every event from disk + ran the full reducer on each app-lifetime first-load — seconds of blocking work for large chats.
            - **Now:** snapshots are written for running sessions too, throttled to once per 200 events (`_maybePersistRunningSnapshot`), called from both `applyEvent` and `applyEventBatch`. Idle↔running transitions no longer invalidate the snapshot: `readSnapshot` accepts a `[idle, running]` crossover and catchup-from-`_lastProcessedSeq` resolves any drift. `sendMessage` also stopped deleting the snapshot — the periodic save overwrites it as the turn streams.
            - Net effect: second-ever open of a large running session hits the snapshot + a tiny catchup instead of replaying thousands of events.

            Carries v0.1.68-10:

            Draft persistence — actually fixed this time:

            - **Drafts now survive session switches.** Root cause: `PromptInput` is conditionally rendered (`{#if sessionAlive || phase === ready || ...}`), so during the switch window when `phase === "loading"` the component unmounts. The rAF-scheduled `promptRef?.restoreSnapshot(incomingDraft)` fired while `promptRef` was `undefined` and silently no-op'd — the draft stayed in `draftsByRunId` + `localStorage` but never made it back into the UI. Replaced the rAF-based apply with a reactive `$effect` that watches `promptRef` and `store.run?.id` and re-applies the pending draft the moment the composer remounts.
            - **Sent text no longer rehydrates on switch-back.** `sendMessage` now eagerly deletes the draft entry for the current run (+ persists), so typing → send → switch-away → switch-back cannot restore the just-sent message into the composer.

            Carries v0.1.68-9:

            - Draft persistence across reload / app restart via `localStorage` (`cairncc:drafts:v1`), attachments stripped for quota.
            - Race closed on New Chat click (`saveDraftFor` before `loadRun("")`).
            - Blank during session switch — `isLoadingReplay` getter.
            - Welcome flash on startup auto-resume — `autoResumeResolving`.

            Carries v0.1.68-8:
            - Duplicate user bubble on switch-into-thinking-session — `applyEventBatch` now skips already-processed `_seq`.
            - "Envisioning…" thinking bubble showing another session's text — `_tryApplySnapshot` treats `thinkingText`/`streamingText` as non-persistent.

            Carries v0.1.68-6:
            - Tiered render on chat switch (60 entries first, full history after paint).
            - New-chat draft preserved across session clicks via sentinel key.

            Carries v0.1.68-5:
            - Effort persisted per-run (restored on switch, seeded on new runs).
            - Model selector falls back to CLI's current model when run has no pinned model.
            - Switch+submit ordering race fixed — new turns always land below the prior response.
            - Chunked event replay with event-loop yields during initial load.
            - Opus label reads "Opus 4.7" consistently.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
