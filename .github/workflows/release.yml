name: Draft Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__-6
          releaseName: "CairnCC v__VERSION__-6"
          releaseBody: |
            ## Draft v0.1.68-6

            Follow-ups to v0.1.68-5 based on Rift CNC test:

            - **Large chats load in tiers now.** Only the last ~60 entries render on switch; the full backlog expands after the browser paints. The chunked replay alone wasn't enough — mounting thousands of Svelte entries was the actual freeze. You can click into another session mid-load.
            - **Draft text is preserved for new (unstarted) chats.** Typing into the welcome/new-chat input and clicking into a saved session now stashes the draft under a sentinel key, so it comes back when you return to the new-chat screen. Previously a missing outgoing run id silently dropped the draft.

            Carries the v0.1.68-5 fixes:
            - Effort is per-chat (persisted to run meta, restored on switch, seeded on new runs).
            - Model selector falls back to CLI's current model when run has no pinned model.
            - Switch+submit ordering race fixed — new turns always land below the prior response.
            - Chunked event replay with event-loop yields during initial load.
            - Opus label now reads "Opus 4.7" consistently.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
