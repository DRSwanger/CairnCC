name: Draft Release

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'draft = Windows-only fast iteration; ga = full Windows + macOS + Linux matrix'
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - ga

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.release_mode == 'ga' && '[{"platform":"windows-latest","args":""},{"platform":"macos-latest","args":"--target universal-apple-darwin"},{"platform":"ubuntu-22.04","args":""}]' || '[{"platform":"windows-latest","args":""}]') }}

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish draft release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: "CairnCC v__VERSION__"
          releaseBody: |
            ## v0.1.71 — diag draft

            **DevTools enabled in this build.** Press **F12** in any CairnCC window to open Chromium DevTools (Console + Network). Use this to capture the actual error for the two open bugs:

            - **Auto-resumed session scroll-through on open** — when CairnCC opens and lands on the most recent existing chat, prior turns visibly scroll past instead of starting at the bottom.
            - **Black window switching into the Rift CNC session** — clicking that specific chat from the sidebar renders a blank page. Likely an unhandled throw during event replay; DevTools console will show the stack.

            No behavior changes vs v0.1.70 — this is purely a diagnostic build with the `devtools` Tauri feature compiled in so the installed Windows build can be inspected.
          releaseDraft: true
          prerelease: true
          includeUpdaterJson: true
          args: ${{ matrix.args }}
